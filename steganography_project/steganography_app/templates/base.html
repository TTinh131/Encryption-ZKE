<!--Định nghĩa cấu trúc HTML cơ bản cho các trang web, bao gồm sidebar, header, footer và các khối nội dung động. -->
<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/images/logo.png" type="image/x-icon">
    <title>{% block title %}SecureMedia - Bảo Mật Dữ Liệu{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Theme CSS -->
    <link rel="stylesheet" href="/static/css/main.css" id="theme-style">
     <script>
        (function() {
            // Ưu tiên sessionStorage cho tab hiện tại
            let theme = sessionStorage.getItem('theme') || 
                       localStorage.getItem('theme') || 
                       'dark';
            // Áp dụng theme ngay lập tức
            document.documentElement.setAttribute('data-theme', theme);
            // Lưu vào sessionStorage để đảm bảo tab này có theme riêng
            sessionStorage.setItem('theme', theme);
        })();
    </script>
    {% block extra_css %}{% endblock %}
</head>
<body data-user-authenticated="{% if user.is_authenticated %}true{% else %}false{% endif %}">
    <div class="wrapper">
        <!-- Sidebar -->
        {% include 'includes/sidebar.html' %}
        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            {% include 'includes/header.html' %}
            <!-- Messages -->
            {% include 'includes/messages.html' %}
            <!-- Page Content -->
            <main class="content">
                {% block content %}
                {% endblock %}
            </main>
            <!-- Footer -->
            {% include 'includes/footer.html' %}
        </div>
    </div>
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/main.js"></script>
    {% block extra_js %}{% endblock %}
    <!-- Auth Modal -->
</body>
</html>
