<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureMedia - Error 403</title>
    <link rel="icon" href="/static/images/logo.png" type="image/x-icon">
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/3.3.7/css/bootstrap.min.css'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #8b5cf6;
            --primary-hover: #7c3aed;
            --primary-light: #a78bfa;
            --primary-dark: #6d28d9;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --shadow: 0 4px 12px rgba(139, 92, 246, 0.1);
            --shadow-lg: 0 10px 40px rgba(139, 92, 246, 0.15);
            --gradient-primary: linear-gradient(135deg, #8b5cf6, #7c3aed);
            --warning-color: #f39c12;
            --warning-hover: #e67e22;
            --warning-gradient: linear-gradient(135deg, #f39c12, #e67e22);
            --bg-light: #f8fafc;
        }

        body {
            color: var(--text-primary);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            display: flex;
            align-items: center;
        }

        .page_404 {
            width: 100%;
        }

        .error-bg {
            background-image: url('/static/images/403.gif');
            background-size: 45%;
            height: 530px;
            background-position: center;
            background-repeat: no-repeat;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .error-code {
            font-size: 10rem;
            font-weight: 800;
            background: var(--warning-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            line-height: 1;
        }

        .error-title {
            font-weight: 700;
            color: var(--text-primary);
            margin-top: -11rem;
        }

        .error-description {
            color: var(--text-secondary);
            font-size: 1.4rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .caveman-message {
            background: #ffffff;
            padding: 2rem;
            border-radius: 16px;
            border-left: 6px solid var(--warning-color);
            margin: 1rem 0;
            text-align: left;
            box-shadow: var(--shadow);
        }

        .caveman-message strong {
            color: var(--warning-color);
            font-size: 1.5rem;
        }

        .btn-error {
            background: var(--warning-gradient);
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow);
            font-size: 1.2rem;
        }

        .btn-error:hover {
            background: var(--warning-hover);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(243, 156, 18, 0.4);
            color: white;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <section class="page_404">
        <div class="container">
            <div class="row">    
                <div class="col-sm-12">
                    <div class="text-center">
                        <div class="error-bg">
                            <h1 class="error-code">403</h1>
                        </div>

                        <h1 class="error-title">Hang động này cần mật khẩu đặc biệt!</h1>
                        
                        <div class="caveman-message">
                            <p>
                                <strong>Người canh hang nói:</strong> "Bạn không có công cụ đá phù hợp để vào đây! 
                                Thử hỏi trưởng bộ lạc về 'mật khẩu' hoặc mang theo nhiều mã hóa hơn!"
                            </p>
                        </div>

                        <p class="error-description">
                            Khu vực này được bảo vệ bằng thuật toán mã hóa cổ xưa và những bức vẽ hang động bí mật!
                        </p>

                        <a href="/" class="btn-error">Tìm Chìa Khóa Hang Động</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
